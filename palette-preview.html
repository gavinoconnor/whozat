<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whozat — Palette</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px 24px 64px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #2a2a26;
    color: #e7e3d8;
  }
  h1 {
    max-width: 1100px;
    margin: 0 auto 24px;
    font-size: 1.4rem;
    font-weight: 700;
  }
  .grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
  }
  .biome {
    background: var(--bg);
    color: var(--text);
    border-radius: 12px;
    padding: 16px 18px 18px;
    font-family: 'Poppins', -apple-system, sans-serif;
  }
  .biome h2 {
    margin: 0 0 10px;
    font-size: 1.05rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .swatch {
    text-align: center;
    font-size: 0.6rem;
    font-weight: 600;
    opacity: 0.85;
  }
  .chip {
    height: 56px;
    border-radius: 6px;
    margin-bottom: 4px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.18), 2px 3px 0 rgba(0,0,0,0.4);
  }
  .label { display: block; line-height: 1.1; }
  .hsl   { display: block; font-weight: 400; opacity: 0.6; font-size: 0.55rem; }

  /* Background swatch shows the bg as a flat chip too, for quick comparison */
  .b-bg     .chip { background: var(--bg);      box-shadow: 0 0 0 1px rgba(0,0,0,0.25); }
  .b-accent .chip { background: var(--accent); }
  .b-1      .chip { background: var(--color-1); }
  .b-2      .chip { background: var(--color-2); }
  .b-3      .chip { background: var(--color-3); }
  .b-4      .chip { background: var(--color-4); }

  .biome.sea {
    --bg: hsl(190, 55%, 90%); --text: hsl(205, 50%, 18%);
    --accent: hsl(188, 75%, 42%);
    --color-1: hsl(178, 65%, 50%); --color-2: hsl(212, 70%, 60%);
    --color-3: hsl(8, 78%, 65%);   --color-4: hsl(45, 88%, 62%);
  }
  .biome.wild {
    --bg: hsl(95, 38%, 90%); --text: hsl(130, 38%, 16%);
    --accent: hsl(108, 55%, 38%);
    --color-1: hsl(110, 50%, 50%); --color-2: hsl(32, 65%, 52%);
    --color-3: hsl(355, 70%, 62%); --color-4: hsl(58, 78%, 60%);
  }
  .biome.farm {
    --bg: hsl(45, 60%, 91%); --text: hsl(28, 50%, 18%);
    --accent: hsl(38, 88%, 50%);
    --color-1: hsl(48, 92%, 60%);  --color-2: hsl(8, 78%, 55%);
    --color-3: hsl(95, 50%, 52%);  --color-4: hsl(335, 65%, 65%);
  }
  .biome.savanna {
    --bg: hsl(30, 60%, 89%); --text: hsl(22, 50%, 18%);
    --accent: hsl(18, 88%, 52%);
    --color-1: hsl(22, 85%, 60%);  --color-2: hsl(42, 82%, 58%);
    --color-3: hsl(355, 70%, 62%); --color-4: hsl(268, 50%, 65%);
  }
  .biome.sky {
    --bg: hsl(220, 50%, 92%); --text: hsl(225, 50%, 18%);
    --accent: hsl(258, 65%, 60%);
    --color-1: hsl(262, 60%, 70%); --color-2: hsl(20, 85%, 68%);
    --color-3: hsl(50, 92%, 65%);  --color-4: hsl(195, 55%, 70%);
  }
  .biome.myth {
    --bg: hsl(285, 38%, 92%); --text: hsl(280, 42%, 16%);
    --accent: hsl(295, 70%, 55%);
    --color-1: hsl(290, 60%, 60%); --color-2: hsl(330, 72%, 60%);
    --color-3: hsl(45, 95%, 60%);  --color-4: hsl(180, 70%, 50%);
  }
</style>
</head>
<body>
  <h1>Whozat — Proposed Palette</h1>

  <div class="grid">

    <div class="biome sea">
      <h2>Sea</h2>
      <div class="row">
        <div class="swatch b-bg"><div class="chip"></div><span class="label">bg</span></div>
        <div class="swatch b-accent"><div class="chip"></div><span class="label">accent</span></div>
        <div class="swatch b-1"><div class="chip"></div><span class="label">turquoise</span></div>
        <div class="swatch b-2"><div class="chip"></div><span class="label">ocean</span></div>
        <div class="swatch b-3"><div class="chip"></div><span class="label">coral</span></div>
        <div class="swatch b-4"><div class="chip"></div><span class="label">sand</span></div>
      </div>
    </div>

    <div class="biome wild">
      <h2>Wild</h2>
      <div class="row">
        <div class="swatch b-bg"><div class="chip"></div><span class="label">bg</span></div>
        <div class="swatch b-accent"><div class="chip"></div><span class="label">accent</span></div>
        <div class="swatch b-1"><div class="chip"></div><span class="label">leaf</span></div>
        <div class="swatch b-2"><div class="chip"></div><span class="label">bark</span></div>
        <div class="swatch b-3"><div class="chip"></div><span class="label">berry</span></div>
        <div class="swatch b-4"><div class="chip"></div><span class="label">sunlight</span></div>
      </div>
    </div>

    <div class="biome farm">
      <h2>Farm</h2>
      <div class="row">
        <div class="swatch b-bg"><div class="chip"></div><span class="label">bg</span></div>
        <div class="swatch b-accent"><div class="chip"></div><span class="label">accent</span></div>
        <div class="swatch b-1"><div class="chip"></div><span class="label">sun</span></div>
        <div class="swatch b-2"><div class="chip"></div><span class="label">barn</span></div>
        <div class="swatch b-3"><div class="chip"></div><span class="label">pasture</span></div>
        <div class="swatch b-4"><div class="chip"></div><span class="label">piglet</span></div>
      </div>
    </div>

    <div class="biome savanna">
      <h2>Savanna</h2>
      <div class="row">
        <div class="swatch b-bg"><div class="chip"></div><span class="label">bg</span></div>
        <div class="swatch b-accent"><div class="chip"></div><span class="label">accent</span></div>
        <div class="swatch b-1"><div class="chip"></div><span class="label">sunset</span></div>
        <div class="swatch b-2"><div class="chip"></div><span class="label">grass</span></div>
        <div class="swatch b-3"><div class="chip"></div><span class="label">clay</span></div>
        <div class="swatch b-4"><div class="chip"></div><span class="label">dusk</span></div>
      </div>
    </div>

    <div class="biome sky">
      <h2>Sky</h2>
      <div class="row">
        <div class="swatch b-bg"><div class="chip"></div><span class="label">bg</span></div>
        <div class="swatch b-accent"><div class="chip"></div><span class="label">accent</span></div>
        <div class="swatch b-1"><div class="chip"></div><span class="label">lavender</span></div>
        <div class="swatch b-2"><div class="chip"></div><span class="label">peach</span></div>
        <div class="swatch b-3"><div class="chip"></div><span class="label">sun</span></div>
        <div class="swatch b-4"><div class="chip"></div><span class="label">cloud</span></div>
      </div>
    </div>

    <div class="biome myth">
      <h2>Myth</h2>
      <div class="row">
        <div class="swatch b-bg"><div class="chip"></div><span class="label">bg</span></div>
        <div class="swatch b-accent"><div class="chip"></div><span class="label">accent</span></div>
        <div class="swatch b-1"><div class="chip"></div><span class="label">violet</span></div>
        <div class="swatch b-2"><div class="chip"></div><span class="label">magic</span></div>
        <div class="swatch b-3"><div class="chip"></div><span class="label">gold</span></div>
        <div class="swatch b-4"><div class="chip"></div><span class="label">gem</span></div>
      </div>
    </div>

  </div>
</body>
</html>
